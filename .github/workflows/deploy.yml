name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        # This tells pnpm where to find your package.json
        run: pnpm install
        working-directory: artifacts/picnic-clone

      - name: Build
        # We run the build command from the root but target the specific workspace
        run: pnpm --filter picnic-clone run build
        env:
          NODE_ENV: production
          PORT: 3000
          BASE_PATH: /Siik-Zakin/ 

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Double-check this path matches your build output folder
          path: artifacts/picnic-clone/dist/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
